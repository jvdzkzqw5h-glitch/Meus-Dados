<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPGS MALÉFICOS DO REISS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-gold: #8e6d13;
            --dark-red: #5e0000; 
            --blood: #8b0000;
            --crit-purple: #a020f0; 
            --panel-bg: rgba(10, 10, 10, 0.92);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: #000; 
            margin: 0; 
            font-family: 'MedievalSharp', cursive; 
            color: #e0e0e0; 
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
        }

        /* Container Principal com borda ornamental */
        .app-container { 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            margin: auto; 
            border: 3px solid var(--dark-gold);
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* Banner Superior */
        .banner { 
            background: linear-gradient(to bottom, #4a0000, #1a0000); 
            padding: 20px; 
            text-align: center; 
            border-bottom: 3px double var(--gold);
            position: relative;
        }
        .banner h1 { 
            font-family: 'Cinzel', serif;
            color: var(--gold); 
            margin: 0; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 2px 2px 8px #000, 0 0 10px var(--dark-gold); 
        }

        /* Navegação */
        .tabs { 
            display: flex; 
            background: #050505; 
            padding: 8px; 
            gap: 4px;
            border-bottom: 1px solid var(--dark-gold);
        }
        .tab { 
            flex: 1; 
            padding: 12px 2px; 
            text-align: center; 
            background: #111; 
            color: var(--gold); 
            border: 1px solid #333; 
            cursor: pointer; 
            font-size: 0.7rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
        }
        .tab.active { 
            background: var(--dark-red); 
            border-color: var(--gold); 
            color: #fff; 
            transform: scale(1.05);
            box-shadow: 0 0 10px var(--blood);
        }

        /* Conteúdo */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .page { 
            flex: 1; 
            padding: 15px; 
            display: none; 
            animation: fadeIn 0.4s ease;
            background-size: cover;
            background-position: center;
        }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo das Caixas de Vidro */
        .glass-panel { 
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            padding: 15px; 
            position: relative;
            box-shadow: inset 0 0 15px #000;
        }
        .glass-panel::before {
            content: ""; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(212, 175, 55, 0.3); pointer-events: none;
        }

        /* VIDA E CORPO */
        .hp-section { margin-bottom: 20px; }
        .hp-bar { height: 22px; background: #000; border: 1px solid var(--gold); border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 0 10px #000; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #800, #b00, #282); width: 100%; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        .body-canvas { display: flex; justify-content: center; align-items: center; position: relative; height: 320px; }
        .side-ctrls { position: absolute; display: flex; flex-direction: column; gap: 12px; }
        .m-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 5px; 
            text-align: center; width: 65px; font-size: 0.6rem; color: var(--gold);
        }
        .b-m { 
            background: #400; color: #fff; border: 1px solid var(--gold); 
            width: 24px; height: 24px; cursor: pointer; transition: 0.2s;
        }
        .b-m:active { background: var(--gold); }

        /* INVENTÁRIO PRO (IGUAL À FOTO) */
        .inv-header { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin-bottom: 15px; letter-spacing: 2px; }
        .inv-split { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; }
        .slot-list { display: flex; flex-direction: column; gap: 8px; }
        .item-row { 
            background: rgba(20,20,20,0.8); border: 1px solid #444; 
            display: flex; align-items: center; padding: 6px; gap: 10px;
            transition: 0.3s;
        }
        .item-row:focus-within { border-color: var(--gold); background: rgba(40,0,0,0.4); }
        .item-row svg { width: 22px; height: 22px; fill: var(--gold); filter: drop-shadow(0 0 5px #000); }
        .item-row input { 
            background: transparent; border: none; color: #fff; 
            font-family: 'MedievalSharp'; font-size: 0.8rem; width: 100%; outline: none; 
        }

        .attr-box { background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 10px; }
        .attr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.7rem; color: var(--gold); }
        .attr-input { 
            width: 45px; background: #000; border: 1px solid var(--dark-gold); 
            color: #fff; text-align: center; padding: 4px; border-radius: 4px;
        }

        /* DADOS COM ANIMAÇÃO MECH */
        .dice-area { text-align: center; }
        .dice-res { 
            font-size: 6rem; color: var(--gold); margin: 20px 0; 
            height: 120px; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 20px #000; font-family: 'Cinzel', serif;
        }
        .rolling { animation: shakeDice 0.1s infinite; color: #444 !important; opacity: 0.6; }
        @keyframes shakeDice { 0% { transform: translate(3px, 3px) rotate(2deg); } 50% { transform: translate(-3px, -3px) rotate(-2deg); } 100% { transform: translate(0); } }
        .critical { color: var(--crit-purple) !important; text-shadow: 0 0 30px var(--crit-purple) !important; animation: critPulse 0.5s infinite alternate; }
        @keyframes critPulse { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.15); filter: brightness(1.5); } }

        /* Botões Gerais */
        .btn-medieval { 
            width: 100%; padding: 15px; background: linear-gradient(#5e0000, #2e0000); 
            color: var(--gold); border: 2px solid var(--gold); font-family: 'Cinzel', serif;
            font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 10px #000; transition: 0.2s;
        }
        .btn-medieval:active { transform: translateY(2px); box-shadow: none; filter: brightness(1.3); }

        /* Backgrounds das Páginas */
        #tab-corpo { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image2.png'); }
        #tab-itens { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('image1.png'); }
        #tab-dados { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image1.png'); }
        #tab-notas { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('image3.png'); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="banner">
        <h1>RPGS MALÉFICOS DO REISS</h1>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="nav('tab-corpo', this)">CORPO</div>
        <div class="tab" onclick="nav('tab-itens', this)">ITENS</div>
        <div class="tab" onclick="nav('tab-dados', this)">DADOS</div>
        <div class="tab" onclick="nav('tab-notas', this)">NOTAS</div>
    </div>

    <div class="main-content">
        <div id="tab-corpo" class="page active">
            <div class="glass-panel">
                <div class="hp-section">
                    <div class="hp-label" style="text-align: center; color: var(--gold); margin-bottom: 5px;">ESTADO VITAL: <span id="ht">100</span>%</div>
                    <div class="hp-bar"><div id="hp-fill"></div></div>
                </div>
                
                <div class="body-canvas">
                    <div class="side-ctrls" style="left:0">
                        <div class="m-box">CAB<br><button class="b-m" onclick="u('h',-1)">-</button> <span id="h">10</span> <button class="b-m" onclick="u('h',1)">+</button></div>
                        <div class="m-box">B.ESQ<br><button class="b-m" onclick="u('le',-1)">-</button> <span id="le">10</span> <button class="b-m" onclick="u('le',1)">+</button></div>
                        <div class="m-box">P.ESQ<br><button class="b-m" onclick="u('pe',-1)">-</button> <span id="pe">10</span> <button class="b-m" onclick="u('pe',1)">+</button></div>
                    </div>
                    
                    <svg width="140" height="280" viewBox="0 0 100 200">
                        <circle cx="50" cy="30" r="15" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                        <rect x="35" y="48" width="30" height="70" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                        <rect x="15" y="50" width="15" height="50" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                        <rect x="70" y="50" width="15" height="50" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                        <rect x="35" y="125" width="12" height="60" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                        <rect x="53" y="125" width="12" height="60" fill="#4d3327" stroke="var(--gold)" stroke-width="1"/>
                    </svg>

                    <div class="side-ctrls" style="right:0">
                        <div class="m-box">TRON<br><button class="b-m" onclick="u('t',-1)">-</button> <span id="t">10</span> <button class="b-m" onclick="u('t',1)">+</button></div>
                        <div class="m-box">B.DIR<br><button class="b-m" onclick="u('rd',-1)">-</button> <span id="rd">10</span> <button class="b-m" onclick="u('rd',1)">+</button></div>
                        <div class="m-box">P.DIR<br><button class="b-m" onclick="u('pd',-1)">-</button> <span id="pd">10</span> <button class="b-m" onclick="u('pd',1)">+</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-itens" class="page">
            <div class="glass-panel">
                <div class="inv-header">FORJA E EQUIPAMENTOS</div>
                <div class="inv-split">
                    <div class="slot-list">
                        <div class="item-row">
                            <svg viewBox="0 0 24 24"><path d="M12 1L7 4.5V11C7 14 9 16.5 12 17.5C15 16.5 17 14 17 11V4.5L12 1Z"/></svg>
                            <input type="text" id="it1" placeholder="Yelmo..." oninput="save()">
                        </div>
                        <div class="item-row">
                            <svg viewBox="0 0 24 24"><path d="M12 2c-2.8 0-5 2.2-5 5v3H5v7h14v-7h-2V7c0-2.8-2.2-5-5-5z"/></svg>
                            <input type="text" id="it2" placeholder="Peitoral..." oninput="save()">
                        </div>
                        <div class="item-row">
                            <svg viewBox="0 0 24 24"><path d="M7 2v10l-2 10h5l1-7 1 7h5l-2-10V2H7z"/></svg>
                            <input type="text" id="it3" placeholder="Pernas..." oninput="save()">
                        </div>
                        <div class="item-row">
                            <svg viewBox="0 0 24 24"><path d="M19.7 4.3c-.4-.4-1-.4-1.4 0L11 11.6l-2.1-2.1 1.4-1.4L3.3 9.5c-.4.4-.4 1 0 1.4l2.8 2.8 7.3-7.3c.4-.4.4-1 0-1.4z"/></svg>
                            <input type="text" id="it4" placeholder="Arma..." oninput="save()">
                        </div>
                        <div class="item-row">
                            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                            <input type="text" id="it5" placeholder="Acessório..." oninput="save()">
                        </div>
                    </div>
                    <div class="attr-box">
                        <center style="font-size:0.5rem; color:var(--gold); margin-bottom:10px;">BUFFS (1-100)</center>
                        <div class="attr-row">FOR <input type="number" id="b1" class="attr-input" value="1" oninput="save()"></div>
                        <div class="attr-row">DEF <input type="number" id="b2" class="attr-input" value="1" oninput="save()"></div>
                        <div class="attr-row">SOR <input type="number" id="b3" class="attr-input" value="1" oninput="save()"></div>
                        <div class="attr-row">MAG <input type="number" id="b4" class="attr-input" value="1" oninput="save()"></div>
                        <div class="attr-row">AGI <input type="number" id="b5" class="attr-input" value="1" oninput="save()"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-dados" class="page">
            <div class="glass-panel dice-area">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div style="flex:1">QTD:<br><input type="number" id="q" style="width:100%" value="1"></div>
                    <div style="flex:1">MOD:<br><input type="number" id="m" style="width:100%" value="0"></div>
                </div>
                <select id="d" style="width:100%; height:40px; background:#111; color:var(--gold); border:1px solid var(--gold); margin-bottom:15px;">
                    <option value="4">D4 (Cajado)</option>
                    <option value="6">D6 (Espada Curta)</option>
                    <option value="8">D8 (Machado)</option>
                    <option value="10">D10 (Montante)</option>
                    <option value="12">D12 (Bárbaro)</option>
                    <option value="20" selected>D20 (Perícia)</option>
                    <option value="100">D100 (Sorte Pura)</option>
                </select>
                <button class="btn-medieval" onclick="lancar()">INVOCAR RESULTADO 🎲</button>
                <div id="res" class="dice-res">0</div>
            </div>
        </div>

        <div id="tab-notas" class="page">
            <div class="glass-panel" style="flex:1; display:flex; flex-direction:column;">
                <div class="inv-header">DIÁRIO DE GUERRA</div>
                <textarea id="nt" style="flex:1; background:#000; color:#ccc; border:1px solid var(--dark-gold); padding:10px; font-family:serif; line-height:1.5;" placeholder="Relate seus feitos heroicos..." oninput="save()"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    let p = {h:10, t:10, le:10, rd:10, pe:10, pd:10};

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function u(m, v) {
        if(p[m]+v >= 0 && p[m]+v <= 10) {
            p[m]+=v; document.getElementById(m).innerText = p[m];
            let c = Object.values(p).reduce((a,b)=>a+b,0);
            let x = Math.round((c/60)*100);
            document.getElementById('hp-fill').style.width = x+"%";
            document.getElementById('ht').innerText = x;
            save();
        }
    }

    function lancar() {
        let res = document.getElementById('res');
        let d = parseInt(document.getElementById('d').value);
        res.classList.add('rolling');
        res.classList.remove('critical');

        let frames = 0;
        let anim = setInterval(() => {
            res.innerText = Math.floor(Math.random()*d)+1;
            frames++;
            if(frames > 15) {
                clearInterval(anim);
                res.classList.remove('rolling');
                calcularSorte();
            }
        }, 50);
    }

    function calcularSorte() {
        let q = parseInt(document.getElementById('q').value) || 1;
        let d = parseInt(document.getElementById('d').value);
        let m = parseInt(document.getElementById('m').value) || 0;
        let res = document.getElementById('res');
        let total = 0;
        let crit = false;

        for(let i=0; i<q; i++) {
            let r1 = Math.floor(Math.random()*d)+1;
            let r2 = Math.floor(Math.random()*d)+1;
            let final = Math.max(r1, r2); // Sorte Roubada
            if(final === d) crit = true;
            total += final;
        }

        res.innerText = total + m;
        if(crit) res.classList.add('critical');
    }

    function save() {
        const data = {
            p: p,
            n: document.getElementById('nt').value,
            it: [
                document.getElementById('it1').value, document.getElementById('it2').value,
                document.getElementById('it3').value, document.getElementById('it4').value,
                document.getElementById('it5').value
            ],
            bf: [
                document.getElementById('b1').value, document.getElementById('b2').value,
                document.getElementById('b3').value, document.getElementById('b4').value,
                document.getElementById('b5').value
            ]
        };
        localStorage.setItem('rpg_data', JSON.stringify(data));
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('rpg_data'));
        if(saved) {
            p = saved.p;
            Object.keys(p).forEach(k => document.getElementById(k).innerText = p[k]);
            u('h', 0); // Atualiza barra de vida
            document.getElementById('nt').value = saved.n || "";
            saved.it.forEach((v, i) => document.getElementById('it'+(i+1)).value = v);
            saved.bf.forEach((v, i) => document.getElementById('b'+(i+1)).value = v);
        }
    };
</script>

</body>
</html>
